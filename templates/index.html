<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title> AI - Киносоветчик </title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h1> AI - Киносоветчик </h1>
  <p>Введите фразу о своем настроении. Искуственный интеллект подберет вам фильм.</p>
  <form method="post">
    <label for="message">Напиши, как ты себя чувствуешь:</label><br>
    <textarea id="message" name="message" rows="4" cols="50"
              placeholder="Например: Сегодня у меня хорошее настроение!"
    required >
        {{ user_text }}
    </textarea><br>
    <button type="submit">Получить рекомендацию</button>
  </form>
  {% if recommendation %}
    <div class="result">
        <h3>Рекомендация: </h3>
        <p>{{recommendation}}</p>
    </div>
  {% endif %}
</body>
</html>
